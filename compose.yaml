services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: stumng:local
    container_name: stumng
    restart: unless-stopped
    init: true
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - ${DEPLOY_ENV_FILE:-.env.deploy}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
